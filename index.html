<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CardScan</title>
  <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="cvScriptLoaded()"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08090d;--surf:#0f1018;--surf2:#161820;
      --border:#252635;--accent:#3df5c1;--adim:rgba(61,245,193,.15);
      --warn:#f5a53d;--text:#dde0f0;--dim:#585a70;
      --font:'Courier New',monospace;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);touch-action:none;-webkit-font-smoothing:antialiased}

    /* ── LOADING ── */
    #loading{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
    #loading.hide{display:none}
    .logo{font-size:22px;font-weight:700;letter-spacing:8px;color:var(--accent)}
    .logo span{color:var(--dim)}
    .spin{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .lbl{font-size:11px;color:var(--dim);letter-spacing:3px}

    /* ── SCHERMI ── */
    .screen{display:flex;flex-direction:column;height:100vh}
    .screen.hide{display:none}
    .hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surf)}
    .hdr-logo{font-size:16px;letter-spacing:6px;color:var(--accent)}
    .hdr-tag{font-size:11px;letter-spacing:2px;color:var(--dim);padding:4px 10px;border:1px solid var(--border)}
    .hdr-tag.ok{color:var(--accent);border-color:var(--accent)}

    /* ── CAMERA ── */
    .cam-wrap{position:relative;flex:1;overflow:hidden;background:#000}
    #video{width:100%;height:100%;object-fit:cover;display:block}
    /* guide corners statici */
    .guide{position:absolute;inset:12%;pointer-events:none}
    .guide::before,.guide::after,.guide i::before,.guide i::after{content:'';position:absolute;width:22px;height:22px;border-color:rgba(255,255,255,.25);border-style:solid}
    .guide::before{top:0;left:0;border-width:2px 0 0 2px}
    .guide::after{top:0;right:0;border-width:2px 2px 0 0}
    .guide i::before{bottom:0;left:0;border-width:0 0 2px 2px}
    .guide i::after{bottom:0;right:0;border-width:0 2px 2px 0}

    /* ── PANEL ── */
    .panel{flex-shrink:0;background:var(--surf);border-top:1px solid var(--border);padding:14px 18px max(18px,env(safe-area-inset-bottom))}
    .thumbs{display:flex;gap:12px;margin-bottom:12px}
    .tw{flex:1}
    .tb{height:52px;background:var(--bg);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;transition:border-color .3s}
    .tb.done{border-color:var(--accent)}
    .tb img{width:100%;height:100%;object-fit:cover}
    .tb .ph{font-size:10px;letter-spacing:2px;color:var(--dim)}
    .tlbl{font-size:10px;letter-spacing:2px;color:var(--dim);text-align:center;margin-top:4px}
    .st{font-size:12px;letter-spacing:1px;color:var(--dim);text-align:center;min-height:18px;margin-bottom:12px;transition:color .3s}
    .st.ok{color:var(--accent)} .st.warn{color:var(--warn)}
    .btn{display:block;width:100%;padding:14px 20px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:13px;letter-spacing:4px;cursor:pointer;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent;margin-bottom:8px}
    .btn:last-child{margin-bottom:0}
    .btn:active,.btn:hover{background:var(--accent);color:var(--bg)}
    .btn.sec{border-color:var(--dim);color:var(--dim)}
    .btn.sec:active,.btn.sec:hover{background:var(--dim);color:var(--bg)}
    .btn.danger{border-color:var(--warn);color:var(--warn)}
    .btn.danger:active,.btn.danger:hover{background:var(--warn);color:var(--bg)}

    /* ── ADJUST SCREEN ── */
    #adjustScreen .cam-wrap{position:relative}
    #frozenImg{width:100%;height:100%;object-fit:contain;display:block;background:#000}
    #adjOverlay{position:absolute;inset:0;touch-action:none}

    /* ── RESULT ── */
    .result-area{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;background:var(--surf2);padding:20px}
    #resultCanvas{max-width:100%;max-height:100%;border:1px solid var(--border);display:block}

    #procCanvas,#capCanvas{display:none}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo">CARD<span>SCAN</span></div>
  <div class="spin"></div>
  <div class="lbl" id="loadLbl">CARICAMENTO OPENCV.JS...</div>
</div>

<!-- ① CAMERA SCREEN -->
<div id="cameraScreen" class="screen hide">
  <div class="hdr">
    <div class="hdr-logo">CARDSCAN</div>
    <div class="hdr-tag" id="camTag">PASSO 1 / 2</div>
  </div>
  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="guide"><i></i></div>
  </div>
  <div class="panel">
    <div class="thumbs">
      <div class="tw"><div class="tb" id="tbFront"><span class="ph">FRONTE</span></div><div class="tlbl">FRONTE</div></div>
      <div class="tw"><div class="tb" id="tbBack"><span class="ph">RETRO</span></div><div class="tlbl">RETRO</div></div>
    </div>
    <div class="st" id="camStatus">INQUADRA IL BIGLIETTO E SCATTA</div>
    <button class="btn" id="shootBtn" onclick="onShoot()">📷 SCATTA FRONTE</button>
  </div>
</div>

<!-- ② ADJUST SCREEN (fermo immagine + angoli) -->
<div id="adjustScreen" class="screen hide">
  <div class="hdr">
    <div class="hdr-logo">CARDSCAN</div>
    <div class="hdr-tag" id="adjTag">AGGIUSTA I BORDI</div>
  </div>
  <div class="cam-wrap" id="adjWrap">
    <img id="frozenImg" alt="">
    <canvas id="adjOverlay"></canvas>
  </div>
  <div class="panel">
    <div class="st ok" id="adjStatus">TRASCINA GLI ANGOLI PER AGGIUSTARE</div>
    <button class="btn" onclick="onConfirm()">✓ CONFERMA E RITAGLIA</button>
    <button class="btn danger" onclick="onRetry()">↩ RISCATTA</button>
  </div>
</div>

<!-- ③ RESULT SCREEN -->
<div id="resultScreen" class="screen hide">
  <div class="hdr">
    <div class="hdr-logo">CARDSCAN</div>
    <div class="hdr-tag ok">COMPLETATO ✓</div>
  </div>
  <div class="result-area"><canvas id="resultCanvas"></canvas></div>
  <div class="panel">
    <div class="st ok">SCANSIONE COMPLETATA — FRONTE + RETRO</div>
    <button class="btn" onclick="downloadResult()">💾 SALVA IN PNG</button>
    <button class="btn sec" onclick="resetApp()">↩ NUOVA SCANSIONE</button>
  </div>
</div>

<canvas id="procCanvas"></canvas>
<canvas id="capCanvas"></canvas>

<script>
'use strict';

// ═══════════ STATE ═══════════
let cvReady = false, stream = null;
let step = 'front';          // 'front' | 'back'
let frontCanvas = null, backCanvas = null;
let frozenDataUrl = null;    // foto congelata (per adjust screen)

// Corners in coords RELATIVE all'immagine congelata visualizzata
// [TL, TR, BR, BL]
let corners = null;
let dragIdx = -1, dragOffX = 0, dragOffY = 0;

const HIT_R  = 34;
const LOUPE_R = 62;
const LOUPE_Z = 3.2;

// DOM
const $ = id => document.getElementById(id);
const $loading  = $('loading');
const $loadLbl  = $('loadLbl');
const $camScr   = $('cameraScreen');
const $adjScr   = $('adjustScreen');
const $resScr   = $('resultScreen');
const $video    = $('video');
const $shootBtn = $('shootBtn');
const $camTag   = $('camTag');
const $camSt    = $('camStatus');
const $adjTag   = $('adjTag');
const $adjSt    = $('adjStatus');
const $frozenImg= $('frozenImg');
const $adjWrap  = $('adjWrap');
const $adjOv    = $('adjOverlay');
const $procCanvas=$('procCanvas');
const $capCanvas =$('capCanvas');
const adjCtx    = $adjOv.getContext('2d');

// ═══════════ OPENCV ═══════════
function cvScriptLoaded(){
  if(typeof cv==='undefined'){setTimeout(cvScriptLoaded,300);return}
  if(cv.getBuildInformation) onCvReady();
  else cv.onRuntimeInitialized=onCvReady;
}
let pollN=0;
setTimeout(function poll(){
  if(cvReady)return;
  if(typeof cv!=='undefined'&&(cv.getBuildInformation||cv.Mat)){onCvReady();return}
  if(++pollN<60)setTimeout(poll,500);
  else $loadLbl.textContent='ERRORE — RICARICA';
},2000);

function onCvReady(){
  if(cvReady)return; cvReady=true;
  $loading.classList.add('hide');
  $camScr.classList.remove('hide');
  startCamera();
}

// ═══════════ CAMERA ═══════════
async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });
    $video.srcObject=stream;
    await $video.play();
  }catch(e){$camSt.textContent='ERRORE FOTOCAMERA: '+e.message;$camSt.className='st warn'}
}
function stopCamera(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
}

// ═══════════ SHOOT ═══════════
function onShoot(){
  // Cattura il frame corrente
  const vw=$video.videoWidth, vh=$video.videoHeight;
  $capCanvas.width=vw; $capCanvas.height=vh;
  $capCanvas.getContext('2d').drawImage($video,0,0);
  frozenDataUrl=$capCanvas.toDataURL('image/jpeg',0.95);

  // Passa ad adjust screen
  $camScr.classList.add('hide');
  $adjScr.classList.remove('hide');

  $frozenImg.onload=()=>{
    resizeAdjOverlay();
    detectOnFrozen();
    bindAdjTouch();
  };
  $frozenImg.src=frozenDataUrl;
}

function onRetry(){
  // Torna alla camera
  $adjScr.classList.add('hide');
  $camScr.classList.remove('hide');
  if(!stream) startCamera();
}

// ═══════════ DETECT ON FROZEN IMAGE ═══════════
function detectOnFrozen(){
  // Lavora sul canvas della foto catturata (piena risoluzione)
  const vw=$capCanvas.width, vh=$capCanvas.height;
  // Scala per velocità
  const SC=0.6;
  const sw=Math.round(vw*SC), sh=Math.round(vh*SC);

  let src=null,small=null,gray=null,blur=null;
  let bestPts=null,bestArea=0;

  try{
    src=cv.imread($capCanvas);
    small=new cv.Mat(); gray=new cv.Mat(); blur=new cv.Mat();
    cv.resize(src,small,new cv.Size(sw,sh));
    cv.cvtColor(small,gray,cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);

    // Multi-pass Canny
    for(const [lo,hi] of [[8,32],[20,70],[45,130],[75,200]]){
      const edges=new cv.Mat();
      cv.Canny(blur,edges,lo,hi);
      const k3=cv.Mat.ones(3,3,cv.CV_8U);
      cv.dilate(edges,edges,k3);
      const k5=cv.Mat.ones(5,5,cv.CV_8U);
      cv.morphologyEx(edges,edges,cv.MORPH_CLOSE,k5);
      k3.delete(); k5.delete();

      const ctrs=new cv.MatVector(), hier=new cv.Mat();
      cv.findContours(edges,ctrs,hier,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);

      const minA=sw*sh*0.02;
      for(let i=0;i<ctrs.size();i++){
        const cnt=ctrs.get(i);
        const area=cv.contourArea(cnt);
        if(area<minA||area>sw*sh*0.97){cnt.delete();continue}
        const hull=new cv.Mat();
        cv.convexHull(cnt,hull);
        const hArea=cv.contourArea(hull);
        const peri=cv.arcLength(hull,true);
        for(const eps of [0.01,0.015,0.02,0.03,0.05,0.08]){
          const ap=new cv.Mat();
          cv.approxPolyDP(hull,ap,eps*peri,true);
          if(ap.rows===4){
            const pts=[];
            for(let j=0;j<4;j++)
              pts.push({x:ap.data32S[j*2]/SC, y:ap.data32S[j*2+1]/SC});
            const [tl,tr,br,bl]=orderPts(pts);
            const w=Math.hypot(tr.x-tl.x,tr.y-tl.y);
            const h=Math.hypot(bl.x-tl.x,bl.y-tl.y);
            const ratio=Math.max(w,h)/(Math.min(w,h)||1);
            if(ratio>=1.1&&ratio<=3.5&&hArea>bestArea){
              bestPts=pts; bestArea=hArea;
            }
          }
          ap.delete();
          if(bestPts&&bestArea>sw*sh*0.06) break;
        }
        hull.delete(); cnt.delete();
      }
      ctrs.delete(); hier.delete(); edges.delete();
      if(bestPts&&bestArea>sw*sh*0.06) break;
    }
  }catch(e){console.error('CV:',e)}
  finally{[src,small,gray,blur].forEach(m=>{try{if(m)m.delete()}catch(_){}})}

  // Converti coordinate immagine → coordinate display sull'img element
  const rect=$frozenImg.getBoundingClientRect();
  const iw=$capCanvas.width, ih=$capCanvas.height;
  const dw=rect.width, dh=rect.height;

  // object-fit:contain → calcola offset letterbox
  const imgRatio=iw/ih, dispRatio=dw/dh;
  let renderW,renderH,offX,offY;
  if(imgRatio>dispRatio){
    renderW=dw; renderH=dw/imgRatio;
    offX=0; offY=(dh-renderH)/2;
  }else{
    renderH=dh; renderW=dh*imgRatio;
    offX=(dw-renderW)/2; offY=0;
  }

  const scaleToDisp = pt => ({
    x: pt.x*(renderW/iw)+offX,
    y: pt.y*(renderH/ih)+offY
  });

  if(bestPts){
    corners=orderPts(bestPts).map(scaleToDisp);
    $adjSt.textContent='BORDI RILEVATI — TRASCINA PER AGGIUSTARE';
    $adjSt.className='st ok';
  }else{
    // Fallback: rettangolo al 70% centrato
    const px=dw*0.12, py=dh*0.15;
    corners=[
      {x:px,      y:py},
      {x:dw-px,   y:py},
      {x:dw-px,   y:dh-py},
      {x:px,      y:dh-py}
    ];
    $adjSt.textContent='BORDI NON RILEVATI — TRASCINA GLI ANGOLI';
    $adjSt.className='st warn';
  }

  drawAdj(null);
}

// ═══════════ ADJUST OVERLAY ═══════════
function resizeAdjOverlay(){
  const r=$adjWrap.getBoundingClientRect();
  $adjOv.width=r.width;
  $adjOv.height=r.height;
}

function bindAdjTouch(){
  // Rimuovi listener precedenti ricreando il canvas
  $adjOv.removeEventListener('touchstart',onTS);
  $adjOv.removeEventListener('touchmove', onTM);
  $adjOv.removeEventListener('touchend',  onTE);
  $adjOv.removeEventListener('mousedown', onMD);
  window.removeEventListener('mousemove', onMM);
  window.removeEventListener('mouseup',   onMU);

  $adjOv.addEventListener('touchstart', onTS,{passive:false});
  $adjOv.addEventListener('touchmove',  onTM,{passive:false});
  $adjOv.addEventListener('touchend',   onTE,{passive:false});
  $adjOv.addEventListener('mousedown',  onMD);
  window.addEventListener('mousemove',  onMM);
  window.addEventListener('mouseup',    onMU);
}

function ptFromTouch(e){
  const r=$adjOv.getBoundingClientRect();
  return{x:e.changedTouches[0].clientX-r.left, y:e.changedTouches[0].clientY-r.top};
}
function ptFromMouse(e){
  const r=$adjOv.getBoundingClientRect();
  return{x:e.clientX-r.left, y:e.clientY-r.top};
}

function nearCorner(pos){
  if(!corners)return -1;
  let best=-1,bestD=Infinity;
  corners.forEach((c,i)=>{
    const d=Math.hypot(c.x-pos.x,c.y-pos.y);
    if(d<HIT_R*2&&d<bestD){best=i;bestD=d}
  });
  return best;
}

function onTS(e){e.preventDefault();const p=ptFromTouch(e);const i=nearCorner(p);if(i<0)return;dragIdx=i;dragOffX=corners[i].x-p.x;dragOffY=corners[i].y-p.y}
function onTM(e){e.preventDefault();if(dragIdx<0)return;const p=ptFromTouch(e);moveDrag(p)}
function onTE(e){e.preventDefault();dragIdx=-1;drawAdj(null)}
function onMD(e){const p=ptFromMouse(e);const i=nearCorner(p);if(i<0)return;dragIdx=i;dragOffX=corners[i].x-p.x;dragOffY=corners[i].y-p.y}
function onMM(e){if(dragIdx<0)return;moveDrag(ptFromMouse(e))}
function onMU(){dragIdx=-1;drawAdj(null)}

function moveDrag(pos){
  const W=$adjOv.width, H=$adjOv.height;
  corners[dragIdx].x=Math.max(0,Math.min(W,pos.x+dragOffX));
  corners[dragIdx].y=Math.max(0,Math.min(H,pos.y+dragOffY));
  drawAdj(pos);
}

// ═══════════ DRAW ADJUST ═══════════
function drawAdj(loupePos){
  const W=$adjOv.width, H=$adjOv.height;
  adjCtx.clearRect(0,0,W,H);
  if(!corners)return;

  const col='#3df5c1';
  const fill='rgba(61,245,193,0.09)';

  // Poligono
  adjCtx.beginPath();
  adjCtx.moveTo(corners[0].x,corners[0].y);
  for(let i=1;i<4;i++) adjCtx.lineTo(corners[i].x,corners[i].y);
  adjCtx.closePath();
  adjCtx.fillStyle=fill; adjCtx.fill();
  adjCtx.strokeStyle=col; adjCtx.lineWidth=2; adjCtx.setLineDash([]); adjCtx.stroke();

  // Handles
  corners.forEach((p,i)=>{
    const active=(i===dragIdx);
    adjCtx.beginPath();
    adjCtx.arc(p.x,p.y,active?22:16,0,Math.PI*2);
    adjCtx.fillStyle=active?col:'rgba(255,255,255,0.2)';
    adjCtx.fill();
    adjCtx.strokeStyle='#fff'; adjCtx.lineWidth=2; adjCtx.stroke();
    adjCtx.beginPath();
    adjCtx.arc(p.x,p.y,4,0,Math.PI*2);
    adjCtx.fillStyle=active?'#000':col; adjCtx.fill();

    // Bracket
    const nx=corners[(i+1)%4], px2=corners[(i+3)%4];
    const dn=n2(nx.x-p.x,nx.y-p.y), dp=n2(px2.x-p.x,px2.y-p.y);
    const L=16;
    adjCtx.beginPath();
    adjCtx.moveTo(p.x+dn.x*L,p.y+dn.y*L);
    adjCtx.lineTo(p.x,p.y);
    adjCtx.lineTo(p.x+dp.x*L,p.y+dp.y*L);
    adjCtx.strokeStyle=col; adjCtx.lineWidth=3; adjCtx.stroke();
  });

  // ── LENTE ──
  if(dragIdx>=0&&loupePos){
    const cx=corners[dragIdx].x, cy=corners[dragIdx].y;
    let lx=cx, ly=cy-LOUPE_R*2.4;
    if(ly<LOUPE_R+8) ly=cy+LOUPE_R*2.4;
    lx=Math.max(LOUPE_R+4,Math.min(W-LOUPE_R-4,lx));
    ly=Math.max(LOUPE_R+4,Math.min(H-LOUPE_R-4,ly));

    // Linea tratteggiata
    adjCtx.beginPath(); adjCtx.moveTo(cx,cy); adjCtx.lineTo(lx,ly);
    adjCtx.strokeStyle='rgba(255,255,255,.3)'; adjCtx.lineWidth=1.5;
    adjCtx.setLineDash([5,5]); adjCtx.stroke(); adjCtx.setLineDash([]);

    // Sorgente zoom: l'immagine congelata già mostrata
    // Usa il frozenImg come sorgente per disegnare la lente
    const iRect=$frozenImg.getBoundingClientRect();
    const oRect=$adjOv.getBoundingClientRect();
    // Offset dell'img rispetto all'overlay (coincidono perché absolute inset:0)
    const iw=$capCanvas.width, ih=$capCanvas.height;
    const dispW=$adjOv.width, dispH=$adjOv.height;

    // Coordinate del punto in pixel immagine originale
    const imgRatio=iw/ih, dispRatio=dispW/dispH;
    let renderW,renderH,offX,offY;
    if(imgRatio>dispRatio){
      renderW=dispW; renderH=dispW/imgRatio; offX=0; offY=(dispH-renderH)/2;
    }else{
      renderH=dispH; renderW=dispH*imgRatio; offX=(dispW-renderW)/2; offY=0;
    }
    const imgX=(cx-offX)/(renderW/iw);
    const imgY=(cy-offY)/(renderH/ih);
    const srcR=(LOUPE_R/LOUPE_Z)*(iw/renderW);

    adjCtx.save();
    adjCtx.beginPath(); adjCtx.arc(lx,ly,LOUPE_R,0,Math.PI*2); adjCtx.clip();
    adjCtx.fillStyle='#000'; adjCtx.fillRect(lx-LOUPE_R,ly-LOUPE_R,LOUPE_R*2,LOUPE_R*2);
    adjCtx.drawImage($capCanvas, imgX-srcR,imgY-srcR,srcR*2,srcR*2, lx-LOUPE_R,ly-LOUPE_R,LOUPE_R*2,LOUPE_R*2);
    adjCtx.restore();

    adjCtx.beginPath(); adjCtx.arc(lx,ly,LOUPE_R,0,Math.PI*2);
    adjCtx.strokeStyle='#fff'; adjCtx.lineWidth=3; adjCtx.stroke();
    adjCtx.beginPath(); adjCtx.arc(lx,ly,LOUPE_R-3,0,Math.PI*2);
    adjCtx.strokeStyle=col; adjCtx.lineWidth=1.5; adjCtx.stroke();

    // Mirino
    const MR=10; adjCtx.strokeStyle=col; adjCtx.lineWidth=1.5;
    [[lx-MR,ly,lx+MR,ly],[lx,ly-MR,lx,ly+MR]].forEach(([x1,y1,x2,y2])=>{
      adjCtx.beginPath(); adjCtx.moveTo(x1,y1); adjCtx.lineTo(x2,y2); adjCtx.stroke();
    });
  }
}

// ═══════════ CONFIRM ═══════════
function onConfirm(){
  // Converti corners display → coordinate pixel immagine originale
  const iw=$capCanvas.width, ih=$capCanvas.height;
  const dispW=$adjOv.width, dispH=$adjOv.height;
  const imgRatio=iw/ih, dispRatio=dispW/dispH;
  let renderW,renderH,offX,offY;
  if(imgRatio>dispRatio){
    renderW=dispW; renderH=dispW/imgRatio; offX=0; offY=(dispH-renderH)/2;
  }else{
    renderH=dispH; renderW=dispH*imgRatio; offX=(dispW-renderW)/2; offY=0;
  }
  const dispToImg=p=>({
    x:(p.x-offX)*(iw/renderW),
    y:(p.y-offY)*(ih/renderH)
  });
  const imagePts=corners.map(dispToImg);
  const warped=perspectiveWarp($capCanvas, imagePts);

  $adjScr.classList.add('hide');

  if(step==='front'){
    frontCanvas=warped;
    updateThumb('tbFront',warped);
    step='back';
    $camTag.textContent='PASSO 2 / 2';
    $shootBtn.textContent='📷 SCATTA RETRO';
    $camSt.textContent='ORA GIRA IL BIGLIETTO E SCATTA IL RETRO';
    $camSt.className='st warn';
    $camScr.classList.remove('hide');
    if(!stream) startCamera();
  }else{
    backCanvas=warped;
    updateThumb('tbBack',warped);
    stopCamera();
    buildResult();
  }
}

// ═══════════ PERSPECTIVE WARP ═══════════
function orderPts(pts){
  const tl=pts.reduce((a,b)=>a.x+a.y<b.x+b.y?a:b);
  const br=pts.reduce((a,b)=>a.x+a.y>b.x+b.y?a:b);
  const tr=pts.reduce((a,b)=>a.x-a.y>b.x-b.y?a:b);
  const bl=pts.reduce((a,b)=>a.x-a.y<b.x-b.y?a:b);
  return[tl,tr,br,bl];
}
function perspectiveWarp(srcCanvas,rawPts){
  const[tl,tr,br,bl]=orderPts(rawPts);
  const maxW=Math.round(Math.max(Math.hypot(tr.x-tl.x,tr.y-tl.y),Math.hypot(br.x-bl.x,br.y-bl.y)));
  const maxH=Math.round(Math.max(Math.hypot(bl.x-tl.x,bl.y-tl.y),Math.hypot(br.x-tr.x,br.y-tr.y)));
  const out=document.createElement('canvas');
  out.width=maxW; out.height=maxH;
  let s=null,d=null,sm=null,dm=null,M=null;
  try{
    s=cv.imread(srcCanvas); d=new cv.Mat();
    sm=cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
    dm=cv.matFromArray(4,1,cv.CV_32FC2,[0,0,maxW,0,maxW,maxH,0,maxH]);
    M=cv.getPerspectiveTransform(sm,dm);
    cv.warpPerspective(s,d,M,new cv.Size(maxW,maxH),cv.INTER_LINEAR,cv.BORDER_REPLICATE);
    cv.imshow(out,d);
  }catch(e){out.getContext('2d').drawImage(srcCanvas,0,0)}
  finally{[s,d,sm,dm,M].forEach(m=>{try{if(m)m.delete()}catch(_){}})}
  return out;
}

// ═══════════ RESULT ═══════════
function buildResult(){
  $resScr.classList.remove('hide');
  const PAD=24,GAP=14,LBLH=30;
  const H=Math.max(frontCanvas.height,backCanvas.height);
  const fw=Math.round(frontCanvas.width*H/frontCanvas.height);
  const bw=Math.round(backCanvas.width*H/backCanvas.height);
  const rc=$('resultCanvas');
  rc.width=PAD*2+fw+GAP+bw; rc.height=PAD*2+H+LBLH;
  const ctx=rc.getContext('2d');
  ctx.fillStyle='#0a0b10'; ctx.fillRect(0,0,rc.width,rc.height);
  ctx.drawImage(frontCanvas,PAD,PAD,fw,H);
  ctx.drawImage(backCanvas,PAD+fw+GAP,PAD,bw,H);
  ctx.strokeStyle='#252635'; ctx.lineWidth=1;
  ctx.strokeRect(PAD,PAD,fw,H); ctx.strokeRect(PAD+fw+GAP,PAD,bw,H);
  ctx.fillStyle='#585a70'; ctx.font='11px "Courier New"'; ctx.textAlign='center';
  ctx.fillText('FRONTE',PAD+fw/2,PAD+H+20);
  ctx.fillText('RETRO',PAD+fw+GAP+bw/2,PAD+H+20);
}

function downloadResult(){
  const rc=$('resultCanvas');
  const now=new Date();
  const ts=[now.getFullYear(),p2(now.getMonth()+1),p2(now.getDate()),'_',p2(now.getHours()),p2(now.getMinutes())].join('');
  const a=document.createElement('a');
  a.download=`biglietto_${ts}.png`; a.href=rc.toDataURL('image/png'); a.click();
}

function resetApp(){
  frontCanvas=backCanvas=null; step='front'; dragIdx=-1;
  $camTag.textContent='PASSO 1 / 2'; $shootBtn.textContent='📷 SCATTA FRONTE';
  $camSt.textContent='INQUADRA IL BIGLIETTO E SCATTA'; $camSt.className='st';
  resetThumb('tbFront','FRONTE'); resetThumb('tbBack','RETRO');
  $resScr.classList.add('hide'); $adjScr.classList.add('hide');
  $camScr.classList.remove('hide');
  startCamera();
}

// ═══════════ HELPERS ═══════════
function updateThumb(id_,canvas){
  const el=document.getElementById(id_),img=new Image();
  img.src=canvas.toDataURL('image/jpeg',.8);
  el.innerHTML=''; el.appendChild(img); el.classList.add('done');
}
function resetThumb(id_,lbl){
  const el=document.getElementById(id_);
  el.innerHTML=`<span class="ph">${lbl}</span>`; el.classList.remove('done');
}
function n2(x,y){const d=Math.sqrt(x*x+y*y)||1;return{x:x/d,y:y/d}}
function p2(n){return String(n).padStart(2,'0')}
</script>
