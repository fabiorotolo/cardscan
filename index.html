<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CardScan — Biglietti da Visita</title>
  <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="cvScriptLoaded()"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08090d; --surface: #0f1018; --surface2: #161820;
      --border: #252635; --accent: #3df5c1; --accent-dim: rgba(61,245,193,0.15);
      --warn: #f5a53d; --text: #dde0f0; --text-dim: #585a70;
      --font: 'Courier New', 'Lucida Console', monospace;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; touch-action: none; }

    /* LOADING */
    #loading { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    #loading.hide { display: none; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: 8px; color: var(--accent); }
    .logo span { color: var(--text-dim); }
    .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-label { font-size: 11px; color: var(--text-dim); letter-spacing: 3px; }

    /* SCAN */
    #scanScreen { display: flex; flex-direction: column; height: 100vh; }
    #scanScreen.hide { display: none; }
    .hdr { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .hdr-logo { font-size: 16px; letter-spacing: 6px; color: var(--accent); }
    .hdr-step { font-size: 11px; letter-spacing: 2px; color: var(--text-dim); padding: 4px 10px; border: 1px solid var(--border); }

    .cam-wrap { position: relative; flex: 1; overflow: hidden; background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; inset: 0; touch-action: none; }

    .badge { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 3px; padding: 5px 14px; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); opacity: 0; transition: opacity .3s; pointer-events: none; }
    .badge.show { opacity: 1; }

    /* panel */
    .panel { flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 14px 18px max(18px, env(safe-area-inset-bottom)); }
    .thumbs { display: flex; gap: 12px; margin-bottom: 12px; }
    .thumb-wrap { flex: 1; }
    .thumb-box { height: 52px; background: var(--bg); border: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; transition: border-color .3s; }
    .thumb-box.done { border-color: var(--accent); }
    .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-box .ph { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); }
    .thumb-lbl { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); text-align: center; margin-top: 4px; }
    .status { font-size: 12px; letter-spacing: 1px; color: var(--text-dim); text-align: center; min-height: 18px; margin-bottom: 12px; transition: color .3s; }
    .status.ok   { color: var(--accent); }
    .status.warn { color: var(--warn); }
    .btn { display: block; width: 100%; padding: 14px 20px; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font); font-size: 13px; letter-spacing: 4px; cursor: pointer; transition: background .2s, color .2s; -webkit-tap-highlight-color: transparent; margin-bottom: 8px; }
    .btn:last-child { margin-bottom: 0; }
    .btn:not(:disabled):active, .btn:not(:disabled):hover { background: var(--accent); color: var(--bg); }
    .btn.sec { border-color: var(--text-dim); color: var(--text-dim); }
    .btn.sec:not(:disabled):active, .btn.sec:not(:disabled):hover { background: var(--text-dim); color: var(--bg); }

    /* RESULT */
    #resultScreen { display: flex; flex-direction: column; height: 100vh; }
    #resultScreen.hide { display: none; }
    .result-area { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background: var(--surface2); padding: 20px; }
    #resultCanvas { max-width: 100%; max-height: 100%; border: 1px solid var(--border); display: block; }

    #procCanvas, #capCanvas { display: none; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo">CARD<span>SCAN</span></div>
  <div class="spinner"></div>
  <div class="load-label" id="loadLabel">CARICAMENTO OPENCV.JS...</div>
</div>

<!-- SCAN -->
<div id="scanScreen" class="hide">
  <div class="hdr">
    <div class="hdr-logo">CARDSCAN</div>
    <div class="hdr-step" id="stepLabel">PASSO 1 / 2</div>
  </div>
  <div class="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="badge" id="badge">BIGLIETTO RILEVATO</div>
  </div>
  <div class="panel">
    <div class="thumbs">
      <div class="thumb-wrap">
        <div class="thumb-box" id="thumbFront"><span class="ph">FRONTE</span></div>
        <div class="thumb-lbl">FRONTE</div>
      </div>
      <div class="thumb-wrap">
        <div class="thumb-box" id="thumbBack"><span class="ph">RETRO</span></div>
        <div class="thumb-lbl">RETRO</div>
      </div>
    </div>
    <div class="status" id="status">INQUADRA IL BIGLIETTO DA VISITA</div>
    <button class="btn" id="captureBtn" onclick="onCapture()">SCATTA FRONTE</button>
    <button class="btn sec" onclick="resetCorners()">REIMPOSTA ANGOLI AUTO</button>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="hide">
  <div class="hdr">
    <div class="hdr-logo">CARDSCAN</div>
    <div class="hdr-step" style="color:var(--accent);border-color:var(--accent)">COMPLETATO ✓</div>
  </div>
  <div class="result-area"><canvas id="resultCanvas"></canvas></div>
  <div class="panel">
    <div class="status ok">SCANSIONE COMPLETATA — FRONTE + RETRO</div>
    <button class="btn" onclick="downloadResult()">SALVA IN PNG</button>
    <button class="btn sec" onclick="resetApp()">NUOVA SCANSIONE</button>
  </div>
</div>

<canvas id="procCanvas"></canvas>
<canvas id="capCanvas"></canvas>

<script>
'use strict';

// ━━━━━ STATE ━━━━━
let cvReady = false, stream = null, rafId = null;
let step = 'front', frontCanvas = null, backCanvas = null;

// corners [TL, TR, BR, BL] in display coords
let corners = null;
let dragIdx = -1, dragOffX = 0, dragOffY = 0;
let autoDetect = true;
let stableCount = 0;
const STABLE_NEEDED = 3;
const HIT_R   = 32;
const LOUPE_R = 60;
const LOUPE_Z = 3.0;

// ── Smoothing: media mobile degli ultimi N rilevamenti ──
const SMOOTH_N  = 6;     // quanti frame mediare
const LERP_SPD  = 0.25;  // velocità interpolazione verso nuovo valore (0=fermo, 1=snap)
let   smoothBuf = [];    // ultimi N array di corners rilevati
let   smoothed  = null;  // corners interpolati correnti (display coords)

// ── Throttle: non elaborare ogni singolo frame per risparmiare CPU ──
let lastDetectTime = 0;
const DETECT_INTERVAL_MS = 80; // ~12fps detection, 60fps rendering

// DOM
const $loading    = id('loading');
const $loadLabel  = id('loadLabel');
const $scanScreen = id('scanScreen');
const $resultScreen = id('resultScreen');
const $video      = id('video');
const $overlay    = id('overlay');
const $badge      = id('badge');
const $status     = id('status');
const $captureBtn = id('captureBtn');
const $stepLabel  = id('stepLabel');
const $procCanvas = id('procCanvas');
const $capCanvas  = id('capCanvas');
const ovCtx = $overlay.getContext('2d');

function id(x) { return document.getElementById(x); }

// ━━━━━ OPENCV INIT ━━━━━
function cvScriptLoaded() {
  if (typeof cv === 'undefined') { setTimeout(cvScriptLoaded, 300); return; }
  if (cv.getBuildInformation) onCvReady();
  else cv.onRuntimeInitialized = onCvReady;
}
let pollN = 0;
setTimeout(function poll() {
  if (cvReady) return;
  if (typeof cv !== 'undefined' && (cv.getBuildInformation || cv.Mat)) { onCvReady(); return; }
  if (++pollN < 60) setTimeout(poll, 500);
  else $loadLabel.textContent = 'ERRORE — RICARICA LA PAGINA';
}, 2000);

function onCvReady() {
  if (cvReady) return;
  cvReady = true;
  $loading.classList.add('hide');
  $scanScreen.classList.remove('hide');
  startCamera();
}

// ━━━━━ CAMERA ━━━━━
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    $video.srcObject = stream;
    $video.onloadedmetadata = () => {
      $video.play();
      resizeOverlay();
      setDefaultCorners();
      bindTouch();
      startLoop();
    };
  } catch(e) { setStatus('ERRORE FOTOCAMERA: ' + e.message, 'warn'); }
}

function stopCamera() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

// ━━━━━ OVERLAY / CORNERS ━━━━━
function resizeOverlay() {
  $overlay.width  = $video.clientWidth  || $overlay.parentElement.clientWidth;
  $overlay.height = $video.clientHeight || $overlay.parentElement.clientHeight;
}

function setDefaultCorners() {
  const W = $overlay.width  || window.innerWidth;
  const H = $overlay.height || (window.innerHeight - 200);
  const mx = W * 0.10, my = H * 0.18;
  corners = [
    { x: mx,     y: my },
    { x: W - mx, y: my },
    { x: W - mx, y: H - my },
    { x: mx,     y: H - my }
  ];
}

// ━━━━━ TOUCH / MOUSE ━━━━━
function bindTouch() {
  $overlay.addEventListener('touchstart',  onTS, { passive: false });
  $overlay.addEventListener('touchmove',   onTM, { passive: false });
  $overlay.addEventListener('touchend',    onTE, { passive: false });
  $overlay.addEventListener('mousedown',   onMD);
  window.addEventListener  ('mousemove',   onMM);
  window.addEventListener  ('mouseup',     onMU);
}

function ptFromTouch(e) {
  const r = $overlay.getBoundingClientRect();
  return { x: e.changedTouches[0].clientX - r.left, y: e.changedTouches[0].clientY - r.top };
}
function ptFromMouse(e) {
  const r = $overlay.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function nearestCorner(pos) {
  if (!corners) return -1;
  let best = -1, bestD = Infinity;
  corners.forEach((c, i) => {
    const d = Math.hypot(c.x - pos.x, c.y - pos.y);
    if (d < HIT_R * 2 && d < bestD) { best = i; bestD = d; }
  });
  return best;
}

function startDrag(pos) {
  const i = nearestCorner(pos);
  if (i < 0) return false;
  dragIdx  = i;
  dragOffX = corners[i].x - pos.x;
  dragOffY = corners[i].y - pos.y;
  autoDetect = false;
  return true;
}
function doDrag(pos) {
  if (dragIdx < 0) return;
  const W = $overlay.width, H = $overlay.height;
  corners[dragIdx].x = Math.max(0, Math.min(W, pos.x + dragOffX));
  corners[dragIdx].y = Math.max(0, Math.min(H, pos.y + dragOffY));
  drawOverlay(corners, true, pos);
}
function endDrag() { dragIdx = -1; drawOverlay(corners, true, null); }

function onTS(e) { e.preventDefault(); if (startDrag(ptFromTouch(e))) e.stopPropagation(); }
function onTM(e) { e.preventDefault(); doDrag(ptFromTouch(e)); }
function onTE(e) { e.preventDefault(); endDrag(); }
function onMD(e) { startDrag(ptFromMouse(e)); }
function onMM(e) { if (dragIdx >= 0) doDrag(ptFromMouse(e)); }
function onMU()  { endDrag(); }

// ━━━━━ MAIN LOOP ━━━━━
function startLoop() {
  function tick(ts) {
    if ($video.readyState >= 2 && cvReady) {
      resizeOverlay();
      if (autoDetect && dragIdx < 0) {
        // Rilevamento a ~12fps per non bloccare il thread
        if (ts - lastDetectTime > DETECT_INTERVAL_MS) {
          lastDetectTime = ts;
          detectCard();
        }
        // Rendering a 60fps con corners interpolati
        if (smoothed) drawOverlay(smoothed, stableCount >= STABLE_NEEDED, null);
      } else if (dragIdx < 0) {
        drawOverlay(corners, true, null);
      }
    }
    rafId = requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ━━━━━ CARD DETECTION ━━━━━
function detectCard() {
  const vw = $video.videoWidth, vh = $video.videoHeight;
  if (!vw || !vh) return;

  $procCanvas.width = vw; $procCanvas.height = vh;
  $procCanvas.getContext('2d').drawImage($video, 0, 0);

  // Scala più alta = contorni più precisi (ma più lento — bilanciato dal throttle)
  const SC = 0.55;
  const sw = Math.round(vw * SC), sh = Math.round(vh * SC);

  let src=null, small=null, gray=null, blur=null;
  let bestPts=null, bestArea=0;

  try {
    src   = cv.imread($procCanvas);
    small = new cv.Mat(); gray = new cv.Mat(); blur = new cv.Mat();
    cv.resize(src, small, new cv.Size(sw, sh));
    cv.cvtColor(small, gray, cv.COLOR_RGBA2GRAY);
    // Blur leggero: preserva i bordi nitidi
    cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);

    for (const [lo, hi] of [[10,40],[25,80],[50,150],[80,220]]) {
      const edges = new cv.Mat();
      cv.Canny(blur, edges, lo, hi);
      const k = cv.Mat.ones(3, 3, cv.CV_8U); // kernel più piccolo = bordi più precisi
      cv.dilate(edges, edges, k);
      cv.morphologyEx(edges, edges, cv.MORPH_CLOSE, k);
      k.delete();

      const ctrs = new cv.MatVector(), hier = new cv.Mat();
      cv.findContours(edges, ctrs, hier, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

      const minA = sw * sh * 0.025;
      for (let i = 0; i < ctrs.size(); i++) {
        const cnt  = ctrs.get(i);
        const area = cv.contourArea(cnt);
        if (area < minA || area > sw*sh*0.97) { cnt.delete(); continue; }
        const hull = new cv.Mat();
        cv.convexHull(cnt, hull);
        const hArea = cv.contourArea(hull);
        const peri  = cv.arcLength(hull, true);
        // Epsilon più stretto per contorno più aderente
        for (const eps of [0.01, 0.015, 0.02, 0.03, 0.05, 0.08]) {
          const ap = new cv.Mat();
          cv.approxPolyDP(hull, ap, eps * peri, true);
          if (ap.rows === 4) {
            const pts = [];
            for (let j = 0; j < 4; j++)
              pts.push({ x: ap.data32S[j*2]/SC, y: ap.data32S[j*2+1]/SC });
            const [tl,tr,br,bl] = orderPts(pts);
            const w = Math.hypot(tr.x-tl.x, tr.y-tl.y);
            const h = Math.hypot(bl.x-tl.x, bl.y-tl.y);
            const ratio = Math.max(w,h) / (Math.min(w,h) || 1);
            if (ratio >= 1.1 && ratio <= 3.2 && hArea > bestArea) {
              bestPts = pts; bestArea = hArea;
            }
          }
          ap.delete();
          if (bestPts && bestArea > sw*sh*0.06) break;
        }
        hull.delete(); cnt.delete();
      }
      ctrs.delete(); hier.delete(); edges.delete();
      if (bestPts && bestArea > sw*sh*0.06) break;
    }
  } catch(e) { console.error('CV:', e); }
  finally { [src, small, gray, blur].forEach(m => { try { if(m) m.delete(); } catch(_){} }); }

  if (bestPts) {
    stableCount = Math.min(stableCount + 1, STABLE_NEEDED + 5);
    const dw = $overlay.width, dh = $overlay.height;
    const sx = dw / $video.videoWidth, sy = dh / $video.videoHeight;
    const raw = orderPts(bestPts).map(p => ({ x: p.x*sx, y: p.y*sy }));

    // ── Aggiungi al buffer di smoothing ──
    smoothBuf.push(raw);
    if (smoothBuf.length > SMOOTH_N) smoothBuf.shift();

    // Media dei punti nel buffer
    const avg = [0,1,2,3].map(i => ({
      x: smoothBuf.reduce((s,f) => s + f[i].x, 0) / smoothBuf.length,
      y: smoothBuf.reduce((s,f) => s + f[i].y, 0) / smoothBuf.length
    }));

    // Interpolazione lineare verso la media (evita salti bruschi)
    if (!smoothed) {
      smoothed = avg;
    } else {
      smoothed = smoothed.map((p, i) => ({
        x: p.x + (avg[i].x - p.x) * LERP_SPD,
        y: p.y + (avg[i].y - p.y) * LERP_SPD
      }));
    }

    if (stableCount >= STABLE_NEEDED) {
      corners = smoothed; // corners aggiornati = quello che userà il warp
      $badge.classList.add('show');
      setStatus('RILEVATO — TRASCINA GLI ANGOLI PER AGGIUSTARE', 'ok');
    }
  } else {
    stableCount = Math.max(stableCount - 1, 0);
    if (stableCount === 0) {
      $badge.classList.remove('show');
      smoothBuf = [];
      setStatus(step==='front' ? 'INQUADRA IL FRONTE DEL BIGLIETTO' : 'GIRA IL BIGLIETTO — INQUADRA IL RETRO', '');
    }
  }
}

// ━━━━━ DRAW OVERLAY ━━━━━
function drawOverlay(pts, confirmed, loupeFingerPos) {
  const W = $overlay.width, H = $overlay.height;
  ovCtx.clearRect(0, 0, W, H);
  if (!pts) return;

  const col  = confirmed ? '#3df5c1' : '#f5a53d';
  const fill = confirmed ? 'rgba(61,245,193,0.09)' : 'rgba(245,165,61,0.07)';

  // Poligono
  ovCtx.beginPath();
  ovCtx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ovCtx.lineTo(pts[i].x, pts[i].y);
  ovCtx.closePath();
  ovCtx.fillStyle = fill; ovCtx.fill();

  // Bordi
  ovCtx.beginPath();
  ovCtx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ovCtx.lineTo(pts[i].x, pts[i].y);
  ovCtx.closePath();
  ovCtx.strokeStyle = col; ovCtx.lineWidth = 2; ovCtx.setLineDash([]); ovCtx.stroke();

  // Angoli — handle
  pts.forEach((p, i) => {
    const active = (i === dragIdx);
    // Cerchio
    ovCtx.beginPath();
    ovCtx.arc(p.x, p.y, active ? 20 : 14, 0, Math.PI*2);
    ovCtx.fillStyle = active ? col : 'rgba(255,255,255,0.18)';
    ovCtx.fill();
    ovCtx.strokeStyle = '#fff'; ovCtx.lineWidth = 2; ovCtx.stroke();
    // Dot
    ovCtx.beginPath();
    ovCtx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ovCtx.fillStyle = active ? '#000' : col; ovCtx.fill();

    // Bracket
    const nx = pts[(i+1)%4], px = pts[(i+3)%4];
    const dn = norm2(nx.x-p.x, nx.y-p.y);
    const dp = norm2(px.x-p.x, px.y-p.y);
    const L = 16;
    ovCtx.beginPath();
    ovCtx.moveTo(p.x + dn.x*L, p.y + dn.y*L);
    ovCtx.lineTo(p.x, p.y);
    ovCtx.lineTo(p.x + dp.x*L, p.y + dp.y*L);
    ovCtx.strokeStyle = col; ovCtx.lineWidth = 3; ovCtx.stroke();
  });

  // ━━━ LENTE ━━━
  if (dragIdx >= 0 && loupeFingerPos) {
    const cx = corners[dragIdx].x;
    const cy = corners[dragIdx].y;

    // Posizione lente: sopra il dito se possibile, altrimenti sotto
    let lx = cx;
    let ly = cy - LOUPE_R * 2.4;
    if (ly < LOUPE_R + 8) ly = cy + LOUPE_R * 2.4;
    // Mantieni nella viewport
    lx = Math.max(LOUPE_R + 4, Math.min(W - LOUPE_R - 4, lx));
    ly = Math.max(LOUPE_R + 4, Math.min(H - LOUPE_R - 4, ly));

    // Linea tratteggiata angolo → lente
    ovCtx.beginPath();
    ovCtx.moveTo(cx, cy); ovCtx.lineTo(lx, ly);
    ovCtx.strokeStyle = 'rgba(255,255,255,0.35)';
    ovCtx.lineWidth = 1.5; ovCtx.setLineDash([5, 5]); ovCtx.stroke();
    ovCtx.setLineDash([]);

    // Clip + zoom video
    const vw = $video.videoWidth, vh = $video.videoHeight;
    const dw = $overlay.width,    dh = $overlay.height;
    const srcX = cx * (vw / dw);
    const srcY = cy * (vh / dh);
    const srcR = LOUPE_R * (vw / dw) / LOUPE_Z;

    ovCtx.save();
    ovCtx.beginPath();
    ovCtx.arc(lx, ly, LOUPE_R, 0, Math.PI*2);
    ovCtx.clip();
    // Sfondo nero prima
    ovCtx.fillStyle = '#000'; ovCtx.fillRect(lx-LOUPE_R, ly-LOUPE_R, LOUPE_R*2, LOUPE_R*2);
    ovCtx.drawImage(
      $video,
      srcX - srcR, srcY - srcR, srcR*2, srcR*2,
      lx - LOUPE_R, ly - LOUPE_R, LOUPE_R*2, LOUPE_R*2
    );
    ovCtx.restore();

    // Cerchio bianco lente
    ovCtx.beginPath();
    ovCtx.arc(lx, ly, LOUPE_R, 0, Math.PI*2);
    ovCtx.strokeStyle = '#ffffff'; ovCtx.lineWidth = 3; ovCtx.stroke();

    // Anello colorato dentro
    ovCtx.beginPath();
    ovCtx.arc(lx, ly, LOUPE_R - 3, 0, Math.PI*2);
    ovCtx.strokeStyle = col; ovCtx.lineWidth = 1.5; ovCtx.stroke();

    // Mirino centrale
    const MR = 10;
    ovCtx.strokeStyle = col; ovCtx.lineWidth = 1.5;
    [[lx-MR, ly, lx+MR, ly],[lx, ly-MR, lx, ly+MR]].forEach(([x1,y1,x2,y2]) => {
      ovCtx.beginPath(); ovCtx.moveTo(x1,y1); ovCtx.lineTo(x2,y2); ovCtx.stroke();
    });
  }
}

// ━━━━━ CAPTURE ━━━━━
function onCapture() {
  const vw = $video.videoWidth, vh = $video.videoHeight;
  const dw = $overlay.width,    dh = $overlay.height;
  $capCanvas.width = vw; $capCanvas.height = vh;
  $capCanvas.getContext('2d').drawImage($video, 0, 0);
  const videoPts = corners.map(p => ({ x: p.x * (vw/dw), y: p.y * (vh/dh) }));
  const warped = perspectiveWarp($capCanvas, videoPts);
  storeCapture(warped);
}

function storeCapture(canvas) {
  if (step === 'front') {
    frontCanvas = canvas;
    updateThumb('thumbFront', canvas);
    step = 'back';
    $stepLabel.textContent = 'PASSO 2 / 2';
    $captureBtn.textContent = 'SCATTA RETRO';
    stableCount = 0; autoDetect = true;
    smoothBuf = []; smoothed = null;
    setDefaultCorners();
    $badge.classList.remove('show');
    setStatus('ORA GIRA IL BIGLIETTO — INQUADRA IL RETRO', 'warn');
  } else {
    backCanvas = canvas;
    updateThumb('thumbBack', canvas);
    stopCamera();
    buildResult();
  }
}

function resetCorners() {
  autoDetect = true; stableCount = 0;
  smoothBuf = []; smoothed = null;
  setDefaultCorners();
  setStatus('RILEVAMENTO IN CORSO...', '');
}

// ━━━━━ PERSPECTIVE WARP ━━━━━
function orderPts(pts) {
  const tl = pts.reduce((a,b) => a.x+a.y < b.x+b.y ? a : b);
  const br = pts.reduce((a,b) => a.x+a.y > b.x+b.y ? a : b);
  const tr = pts.reduce((a,b) => a.x-a.y > b.x-b.y ? a : b);
  const bl = pts.reduce((a,b) => a.x-a.y < b.x-b.y ? a : b);
  return [tl, tr, br, bl];
}
function perspectiveWarp(srcCanvas, rawPts) {
  const [tl,tr,br,bl] = orderPts(rawPts);
  const maxW = Math.round(Math.max(Math.hypot(tr.x-tl.x,tr.y-tl.y), Math.hypot(br.x-bl.x,br.y-bl.y)));
  const maxH = Math.round(Math.max(Math.hypot(bl.x-tl.x,bl.y-tl.y), Math.hypot(br.x-tr.x,br.y-tr.y)));
  const out = document.createElement('canvas');
  out.width = maxW; out.height = maxH;
  let src=null,dst=null,srcM=null,dstM=null,M=null;
  try {
    src  = cv.imread(srcCanvas);
    dst  = new cv.Mat();
    srcM = cv.matFromArray(4,1,cv.CV_32FC2,[tl.x,tl.y,tr.x,tr.y,br.x,br.y,bl.x,bl.y]);
    dstM = cv.matFromArray(4,1,cv.CV_32FC2,[0,0,maxW,0,maxW,maxH,0,maxH]);
    M    = cv.getPerspectiveTransform(srcM, dstM);
    cv.warpPerspective(src,dst,M,new cv.Size(maxW,maxH),cv.INTER_LINEAR,cv.BORDER_REPLICATE);
    cv.imshow(out, dst);
  } catch(e) {
    out.getContext('2d').drawImage(srcCanvas, 0, 0);
  } finally {
    [src,dst,srcM,dstM,M].forEach(m => { try { if(m) m.delete(); } catch(_){} });
  }
  return out;
}

// ━━━━━ RESULT ━━━━━
function buildResult() {
  $scanScreen.classList.add('hide');
  $resultScreen.classList.remove('hide');
  const PAD=24, GAP=14, LBLH=30;
  const H = Math.max(frontCanvas.height, backCanvas.height);
  const fw = Math.round(frontCanvas.width * H / frontCanvas.height);
  const bw = Math.round(backCanvas.width  * H / backCanvas.height);
  const rc = id('resultCanvas');
  rc.width = PAD*2+fw+GAP+bw; rc.height = PAD*2+H+LBLH;
  const ctx = rc.getContext('2d');
  ctx.fillStyle = '#0a0b10'; ctx.fillRect(0,0,rc.width,rc.height);
  ctx.drawImage(frontCanvas, PAD, PAD, fw, H);
  ctx.drawImage(backCanvas,  PAD+fw+GAP, PAD, bw, H);
  ctx.strokeStyle = '#252635'; ctx.lineWidth = 1;
  ctx.strokeRect(PAD,PAD,fw,H); ctx.strokeRect(PAD+fw+GAP,PAD,bw,H);
  ctx.fillStyle = '#585a70'; ctx.font = '11px "Courier New"'; ctx.textAlign = 'center';
  ctx.fillText('FRONTE', PAD+fw/2, PAD+H+20);
  ctx.fillText('RETRO',  PAD+fw+GAP+bw/2, PAD+H+20);
}

function downloadResult() {
  const rc = id('resultCanvas');
  const now = new Date();
  const ts = [now.getFullYear(),p2(now.getMonth()+1),p2(now.getDate()),'_',p2(now.getHours()),p2(now.getMinutes())].join('');
  const a = document.createElement('a');
  a.download = `biglietto_${ts}.png`; a.href = rc.toDataURL('image/png'); a.click();
}

function resetApp() {
  frontCanvas = backCanvas = null;
  step = 'front'; stableCount = 0; autoDetect = true; dragIdx = -1;
  smoothBuf = []; smoothed = null;
  $stepLabel.textContent = 'PASSO 1 / 2'; $captureBtn.textContent = 'SCATTA FRONTE';
  resetThumb('thumbFront','FRONTE'); resetThumb('thumbBack','RETRO');
  $badge.classList.remove('show');
  $resultScreen.classList.add('hide'); $scanScreen.classList.remove('hide');
  startCamera();
}

// ━━━━━ HELPERS ━━━━━
function setStatus(msg, type) { $status.textContent = msg; $status.className = 'status'+(type?' '+type:''); }
function updateThumb(id_, canvas) {
  const el = id(id_), img = new Image();
  img.src = canvas.toDataURL('image/jpeg',0.8);
  el.innerHTML=''; el.appendChild(img); el.classList.add('done');
}
function resetThumb(id_, lbl) {
  const el = id(id_); el.innerHTML=`<span class="ph">${lbl}</span>`; el.classList.remove('done');
}
function norm2(x,y) { const d=Math.sqrt(x*x+y*y)||1; return {x:x/d,y:y/d}; }
function p2(n) { return String(n).padStart(2,'0'); }
</script>
